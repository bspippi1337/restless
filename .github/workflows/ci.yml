name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Show toolchain
        run: |
          go version
          docker --version

      - name: Normalize module graph
        run: |
          go mod tidy
          go mod download

      - name: Verify module graph
        run: |
          git diff --exit-code go.mod go.sum

      - name: Build
        run: |
          make build || go build ./cmd/restless

      - name: Test
        run: |
          go test ./...

      - name: Smoke test binary
        run: |
          ./build/restless --help || \
          go run ./cmd/restless --help

      - name: Debian package smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            debhelper \
            dh-golang \
            golang-any \
            build-essential

          dpkg-buildpackage -us -uc -b

      - name: Docker smoke
        run: |
          docker build --no-cache -t restless-install-test .
          docker run --rm restless-install-test
