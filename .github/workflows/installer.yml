name: Installer Test

on:
  push:
  workflow_dispatch:

jobs:
  installer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build image
        run: |
          docker build --no-cache -t restless-install-test .

      - name: Runtime smoke
        run: |
          docker run --rm restless-install-test
