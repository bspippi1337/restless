name: Installer Test

on:
  push:
  workflow_dispatch:

jobs:
  installer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build --no-cache -t restless-install-test .

      - name: Run runtime smoke
        run: |
          docker run --rm restless-install-test
