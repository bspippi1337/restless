name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Show toolchain
        run: |
          go version
          make --version | head -n 1

      - name: Verify module graph
        run: go mod verify

      - name: Check supported runtime
        run: make check

      - name: Smoke test binary
        run: |
          ./build/restless --help
          ./build/restless watch --help

  debian-packaging-smoke:
    name: Debian packaging smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends devscripts debhelper dh-golang golang-any lintian

      - name: Build Debian source/binary package
        run: dpkg-buildpackage -us -uc -b

      - name: Run lintian
        run: lintian ../restless_*.changes || true
