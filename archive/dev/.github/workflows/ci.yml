name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go mod tidy
        run: go mod tidy

      - name: Test (core only)
        run: go test $(go list ./... | grep -v "/experiments/")

      - name: Build CLI
        run: go build ./cmd/restless

      - name: Verify binary runs
        run: ./restless --help
