name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SOURCE_DATE_EPOCH: 1704067200

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Show toolchain
        run: |
          go version
          make --version | head -n 1

      - name: Normalize module graph
        run: go mod tidy

      - name: Verify module graph
        run: go mod verify

      - name: Check supported runtime
        run: make check

      - name: Race detector
        run: make race

      - name: Generate coverage profile
        run: |
          PKGS=$(go list ./... | grep -v '/archive/' | grep -v '/cmd/wasm')
          go test -coverprofile=coverage.out $PKGS
          go tool cover -func=coverage.out

      - name: Reproducible build verification
        run: |
          make reproducible-build
          mkdir -p .repro
          cp build/restless .repro/restless.first
          make clean
          make reproducible-build
          sha256sum build/restless .repro/restless.first
          cmp build/restless .repro/restless.first

      - name: Release artifact smoke
        run: make release

      - name: Smoke test binary
        run: |
          ./build/restless --help
          ./build/restless watch --help
          test -s dist/restless-linux-amd64.tar.gz
          test -s dist/SHA256SUMS.txt

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Upload release smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke
          path: dist/

      - name: Report module drift
        if: always()
        run: |
          git diff -- go.mod go.sum || true

  debian-packaging-smoke:
    name: Debian packaging smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential golang-any devscripts debhelper dh-golang lintian autopkgtest

      - name: Normalize module graph
        run: go mod tidy

      - name: Build Debian source/binary package
        run: dpkg-buildpackage -us -uc -b

      - name: Install built package
        run: sudo dpkg -i ../restless_*.deb

      - name: Run autopkgtest smoke
        run: |
          autopkgtest . -- null

      - name: Run piuparts-style smoke
        run: |
          chmod +x debian/piuparts-smoke.sh
          ./debian/piuparts-smoke.sh

      - name: Run lintian
        run: lintian ../restless_*.changes
