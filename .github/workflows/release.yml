name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist

          GOOS=linux GOARCH=amd64 \
            go build -o dist/restless-linux-amd64 ./cmd/restless

          GOOS=linux GOARCH=arm64 \
            go build -o dist/restless-linux-arm64 ./cmd/restless

          GOOS=darwin GOARCH=amd64 \
            go build -o dist/restless-darwin-amd64 ./cmd/restless

          GOOS=windows GOARCH=amd64 \
            go build -o dist/restless-windows-amd64.exe ./cmd/restless

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
