
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          make dist
          make checksum

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: restless-binaries
          path: dist/
