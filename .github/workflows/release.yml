name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SOURCE_DATE_EPOCH: 1704067200

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends devscripts debhelper dh-golang golang-any lintian

      - name: Normalize module graph
        run: go mod tidy

      - name: Build runtime artifacts
        run: |
          make release

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b
          cp ../restless_*.deb dist/ || true
          cp ../restless_*.changes dist/ || true
          cp ../restless_*.buildinfo dist/ || true

      - name: Generate checksums
        run: |
          cd dist
          rm -f SHA256SUMS.txt
          sha256sum * > SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt

      - name: Attest release tarball provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/restless-linux-amd64.tar.gz

      - name: Attest Debian package provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.deb

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
