name: CI

on:
  push:
  pull_request:

jobs:
  make-check:
    name: make check (1.24.x)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Show toolchain
        run: |
          go version
          docker --version

      - name: Normalize module graph
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify module graph
        run: go mod verify

      - name: Race detector
        run: go test -race ./...

      - name: Generate coverage profile
        run: go test -coverprofile=coverage.out ./...

      - name: Reproducible build verification
        run: |
          mkdir -p build
          CGO_ENABLED=0 go build \
            -trimpath \
            -buildvcs=false \
            -o build/restless \
            ./cmd/restless

      - name: Smoke test binary
        run: |
          ./build/restless --version
          ./build/restless --help >/dev/null

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  debian-package:
    name: Debian packaging smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            dh-golang \
            golang-any \
            fakeroot

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Install built package
        run: |
          DEB="$(find .. -maxdepth 1 -name 'restless_*_amd64.deb' | head -n1)"
          sudo dpkg -i "$DEB" || sudo apt-get install -fy

      - name: Run Debian smoke test
        run: |
          command -v restless
          restless --version
          restless --help >/dev/null

      - name: Build Docker image
        run: |
          docker build -t restless-install-test .
          docker image inspect restless-install-test
          docker run --rm --entrypoint /bin/sh restless-install-test -c "ls -lah /usr/local/bin && file /usr/local/bin/restless"

      - name: Docker smoke test
        run: |
          docker run --rm --entrypoint /usr/local/bin/restless restless-install-test --version --version
