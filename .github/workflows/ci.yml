name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Toolchain
        run: |
          go version
          docker --version

      - name: Normalize modules
        run: |
          go mod tidy
          go mod download

      - name: Verify module graph
        run: |
          git diff --exit-code go.mod go.sum

      - name: Formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: |
          go vet ./...

      - name: Test
        run: |
          go test ./...

      - name: Build
        run: |
          mkdir -p build
          go build -o build/restless ./cmd/restless

      - name: Binary smoke
        run: |
          ./build/restless --help

      - name: Debian smoke
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts \
            debhelper \
            dh-golang \
            golang-any \
            build-essential

          dpkg-buildpackage -us -uc -b

      - name: Docker smoke
        run: |
          docker build --no-cache -t restless-install-test .
          docker run --rm restless-install-test
