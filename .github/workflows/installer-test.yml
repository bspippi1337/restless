name: Installer Test

on:
  push:
  pull_request:

jobs:
  installer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build installer test container
        run: docker build -f Dockerfile.install-test -t restless-install-test .

      - name: Run installer test
        run: docker run --rm restless-install-test
